name: CI
on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.13.1'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci 
      - name: Run test
        run: npm test